name = "gen-rpt-review"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"

# R2 access must be done via S3-compatible API using environment variables.
# The native binding fails because the bucket is in a different account.
# Set these in: Cloudflare Pages Dashboard → Settings → Environment Variables
#
#   R2_ACCOUNT_ID
#   R2_ACCESS_KEY_ID
#   R2_SECRET_ACCESS_KEY
#   R2_BUCKET
