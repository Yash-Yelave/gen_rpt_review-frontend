name = "gen-rpt-review"
compatibility_date = "2024-09-23"

# R2 bucket binding for Pages Functions
# bucket_name must match the bucket you created in the Cloudflare dashboard.
# For local dev, wrangler emulates R2 in .wrangler/state/v3/r2/
[[r2_buckets]]
binding = "REPORTS_BUCKET"
bucket_name = "gen-rpt-reports"
